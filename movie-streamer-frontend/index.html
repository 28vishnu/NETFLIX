<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - StreamVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col bg-[#141414] text-[#e5e5e5]">
    <header class="bg-gradient-to-b from-black to-transparent p-4 md:px-8 flex justify-between items-center fixed top-0 w-full z-50 transition-all duration-300" id="main-header">
        <div class="flex items-center space-x-4 md:space-x-6">
            <a href="#" class="text-red-600 text-3xl md:text-4xl font-bold tracking-tighter">NETFLIX</a>
            <nav class="hidden md:flex space-x-6 text-gray-300 text-sm">
                <a href="#" class="nav-link hover:text-white transition-colors duration-200 active" data-content="home">Home</a>
                <a href="#" class="nav-link hover:text-white transition-colors duration-200" data-content="series">TV Shows</a>
                <a href="#" class="nav-link hover:text-white transition-colors duration-200" data-content="movies">Movies</a>
                <a href="#" class="nav-link hover:text-white transition-colors duration-200" data-content="mylist">My List</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4 md:space-x-6">
            <div id="search-input-wrapper" class="relative hidden md:block">
                <input type="text" id="search-input" placeholder="Search for movies or TV shows..." class="bg-gray-800 text-white px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-red-600 w-64">
                <button id="search-toggle-btn" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white md:hidden">
                    <i class="fas fa-search text-lg"></i>
                </button>
            </div>
            <button id="search-toggle-btn-mobile" class="text-gray-300 hover:text-white md:hidden">
                <i class="fas fa-search text-lg"></i>
            </button>
            <div id="user-details" class="flex items-center space-x-2 cursor-pointer">
                <img id="user-profile-img" src="https://placehold.co/40x40/FF0000/FFFFFF?text=U" alt="User Profile" class="rounded-md w-8 h-8 md:w-10 md:h-10 object-cover">
                <span class="hidden md:block text-sm font-semibold">Guest</span>
                <i class="fas fa-caret-down text-gray-300 hidden md:block"></i>
            </div>
        </div>
    </header>

    <section id="hero-section" class="relative w-full h-[50vh] md:h-[70vh] lg:h-[80vh] overflow-hidden flex items-end">
        <div id="hero-slides-container" class="absolute inset-0 flex transition-transform duration-700 ease-in-out">
            </div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
        <div class="absolute bottom-0 left-0 p-4 md:p-8 lg:p-12 text-white z-10 w-full md:w-2/3 lg:w-1/2">
            <h1 id="hero-title" class="text-3xl md:text-5xl lg:text-6xl font-bold mb-2 drop-shadow-lg"></h1>
            <p id="hero-overview" class="text-sm md:text-base lg:text-lg mb-4 line-clamp-3 drop-shadow-md"></p>
            <div class="flex space-x-3">
                <button id="hero-play-btn" class="bg-white text-black px-4 py-2 md:px-6 md:py-3 rounded-md font-semibold hover:bg-gray-300 transition-colors duration-200 flex items-center space-x-2">
                    <i class="fas fa-play"></i>
                    <span>Play</span>
                </button>
                <button id="hero-info-btn" class="bg-gray-700 text-white px-4 py-2 md:px-6 md:py-3 rounded-md font-semibold hover:bg-gray-600 transition-colors duration-200 flex items-center space-x-2">
                    <i class="fas fa-info-circle"></i>
                    <span>More Info</span>
                </button>
            </div>
        </div>
        <button id="hero-prev-btn" class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full z-10 hover:bg-opacity-75 transition-opacity duration-200">
            <i class="fas fa-chevron-left text-xl"></i>
        </button>
        <button id="hero-next-btn" class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full z-10 hover:bg-opacity-75 transition-opacity duration-200">
            <i class="fas fa-chevron-right text-xl"></i>
        </button>
        <div id="hero-dots-container" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2 z-10">
            </div>
    </section>

    <main class="flex-grow p-4 md:p-8 lg:p-12 mt-[-80px] md:mt-[-100px] relative z-20">
        <div id="loading-indicator" class="text-center text-gray-400 text-lg py-10 hidden">
            <i class="fas fa-spinner fa-spin mr-2"></i> Loading content...
        </div>

        <section id="search-results-section" class="hidden">
            <h2 class="text-2xl md:text-3xl font-bold mb-6">Search Results</h2>
            <div id="search-results-grid" class="movie-grid-category">
                </div>
            <div id="search-pagination" class="flex justify-center items-center space-x-4 mt-8">
                <button id="search-prev-btn" class="bg-gray-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-gray-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Previous</button>
                <span id="search-page-info" class="text-gray-300"></span>
                <button id="search-next-btn" class="bg-gray-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-gray-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Next</button>
            </div>
        </section>

        <div id="movie-sections" class="space-y-8 md:space-y-12">
            </div>

        <section id="all-content-view" class="hidden mt-8">
            <h2 id="all-content-title" class="text-2xl md:text-3xl font-bold mb-6"></h2>
            <div id="all-content-grid" class="movie-grid-category">
                </div>
            <div id="all-content-pagination" class="flex justify-center items-center space-x-4 mt-8">
                <button id="view-all-prev-btn" class="bg-gray-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-gray-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Previous</button>
                <span id="view-all-page-info" class="text-gray-300"></span>
                <button id="view-all-next-btn" class="bg-gray-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-gray-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Next</button>
            </div>
        </section>
    </main>

    <nav id="mobile-bottom-nav" class="fixed bottom-0 left-0 w-full bg-black bg-opacity-95 text-gray-400 text-xs py-2 z-50 border-t border-gray-800 flex justify-around items-center md:hidden">
        <a href="#" class="nav-link flex flex-col items-center p-2 hover:text-white transition-colors duration-200 active" data-content="home">
            <i class="fas fa-home text-lg mb-1"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-link flex flex-col items-center p-2 hover:text-white transition-colors duration-200" data-content="series">
            <i class="fas fa-tv text-lg mb-1"></i>
            <span>TV Shows</span>
        </a>
        <a href="#" class="nav-link flex flex-col items-center p-2 hover:text-white transition-colors duration-200" data-content="movies">
            <i class="fas fa-film text-lg mb-1"></i>
            <span>Movies</span>
        </a>
        <a href="#" class="nav-link flex flex-col items-center p-2 hover:text-white transition-colors duration-200" data-content="mylist">
            <i class="fas fa-list text-lg mb-1"></i>
            <span>My List</span>
        </a>
    </nav>

    <div id="detail-overlay" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[100] hidden p-4">
        <div class="relative bg-[#1a1a1a] rounded-lg shadow-xl overflow-hidden w-full max-w-4xl max-h-[90vh] flex flex-col md:flex-row">
            <button id="close-detail-overlay-btn" class="absolute top-3 right-3 text-white text-2xl bg-gray-800 rounded-full w-8 h-8 flex items-center justify-center hover:bg-gray-700 z-10">
                <i class="fas fa-times"></i>
            </button>

            <div class="w-full md:w-1/2 relative">
                <img id="detail-poster" src="" alt="Content Poster" class="w-full h-auto object-cover rounded-t-lg md:rounded-l-lg md:rounded-tr-none">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                <div class="absolute bottom-4 left-4 flex space-x-3 z-10">
                    <button id="detail-play-btn" class="bg-white text-black px-4 py-2 rounded-md font-semibold hover:bg-gray-300 transition-colors duration-200 flex items-center space-x-2">
                        <i class="fas fa-play"></i>
                        <span>Play</span>
                    </button>
                    <button id="detail-my-list-btn" class="bg-gray-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-gray-600 transition-colors duration-200 flex items-center space-x-2">
                        <i class="fas fa-plus"></i>
                        <span>My List</span>
                    </button>
                </div>
            </div>

            <div class="w-full md:w-1/2 p-6 overflow-y-auto custom-scrollbar">
                <h2 id="detail-title" class="text-3xl md:text-4xl font-bold mb-3 text-white"></h2>
                <p id="detail-release-year" class="text-gray-400 text-sm mb-2"></p>
                <p id="detail-runtime" class="text-gray-400 text-sm mb-2"></p>
                <div class="flex items-center space-x-2 mb-4">
                    <span id="detail-rating" class="bg-yellow-500 text-black text-xs font-bold px-2 py-1 rounded"></span>
                    <span id="detail-genres" class="text-gray-300 text-sm"></span>
                </div>
                <p id="detail-overview" class="text-gray-300 text-base leading-relaxed mb-4"></p>
                <p id="detail-cast" class="text-gray-400 text-sm"><strong class="text-white">Cast:</strong> <span id="cast-list"></span></p>
                <p id="detail-director" class="text-gray-400 text-sm mt-1"><strong class="text-white">Director:</strong> <span id="director-name"></span></p>
            </div>
        </div>
    </div>

    <div id="video-player-overlay" class="fixed inset-0 bg-black bg-opacity-95 flex items-center justify-center z-[110] hidden">
        <div class="relative w-full h-full max-w-6xl max-h-[90vh] flex items-center justify-center">
            <button id="close-player-btn" class="absolute top-4 right-4 text-white text-3xl bg-gray-800 rounded-full w-10 h-10 flex items-center justify-center hover:bg-gray-700 z-10">
                <i class="fas fa-times"></i>
            </button>
            <div id="video-player-container" class="relative w-full h-full flex items-center justify-center bg-black">
                <div id="buffering-spinner" class="absolute text-white text-4xl hidden">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
                <iframe id="movie-player" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
