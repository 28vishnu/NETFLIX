<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="style.css"> 

    </head>
<body class="bg-[#141414] text-[#e5e5e5]">
    <header id="main-header" class="fixed top-0 left-0 w-full z-50 p-4 flex items-center justify-between transition-all duration-300">
        <div class="flex items-center space-x-6">
            <h1 class="text-red-600 text-3xl font-bold">NETFLIX</h1>
            <nav class="hidden md:block">
                <ul class="flex space-x-4">
                    <li><a href="#" class="nav-link text-white hover:text-gray-300 transition-colors active" data-content="home">Home</a></li>
                    <li><a href="#" class="nav-link text-white hover:text-gray-300 transition-colors" data-content="movies">Movies</a></li>
                    <li><a href="#" class="nav-link text-white hover:text-gray-300 transition-colors" data-content="series">Series</a></li>
                    <li><a href="#" class="nav-link text-white hover:text-gray-300 transition-colors" data-content="mylist">My List</a></li>
                </ul>
            </nav>
        </div>
        <div class="flex items-center space-x-4">
            <div class="relative flex items-center w-full md:w-auto">
                <button id="search-toggle-btn" class="text-white text-xl hover:text-gray-300 transition-colors mr-2">
                    <i class="fas fa-search"></i>
                </button>
                <div id="search-input-wrapper" class="relative hidden flex-grow md:block">
                    <input type="text" id="desktop-search-input" placeholder="Search..." class="bg-gray-800 text-white px-3 py-1 rounded-md focus:outline-none focus:ring-2 focus:ring-red-600 transition-all duration-300 w-full">
                </div>
            </div>
            <div id="user-details" class="flex items-center space-x-2">
                <span class="text-sm md:text-base">Guest</span>
                <img src="https://placehold.co/40x40/FF0000/FFFFFF?text=G" alt="User Avatar" class="w-8 h-8 rounded-full border-2 border-white">
            </div>
        </div>
    </header>

    <section id="hero-section" class="relative">
        <div id="hero-slides-container" class="hero-slides-container">
            </div>
        <button id="hero-prev-btn" class="hero-nav-btn left-4"><i class="fas fa-chevron-left"></i></button>
        <button id="hero-next-btn" class="hero-nav-btn right-4"><i class="fas fa-chevron-right"></i></button>
        <div id="hero-dots-container" class="hero-dots-container">
            </div>
    </section>

    <main class="container mx-auto px-4 py-8">
        <div id="loading-indicator" class="hidden">
            <i class="fas fa-spinner fa-spin text-red-600 text-4xl"></i>
            <p class="mt-4 text-lg">Loading content...</p>
        </div>
        <div id="movie-sections" class="relative">
            </div>
    </main>

    <div id="detail-overlay-container" class="detail-overlay fixed inset-0 z-40">
        </div>

    <div id="message-box" class="fixed bottom-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg text-white font-semibold text-center z-[9999] opacity-0 transition-opacity duration-300">
        </div>

    <nav id="mobile-bottom-nav">
        <ul>
            <li><a href="#" class="nav-link active" data-content="home"><i class="fas fa-home"></i>Home</a></li>
            <li><a href="#" class="nav-link" data-content="movies"><i class="fas fa-film"></i>Movies</a></li>
            <li><a href="#" class="nav-link" data-content="series"><i class="fas fa-tv"></i>Series</a></li>
            <li><a href="#" class="nav-link" data-content="mylist"><i class="fas fa-heart"></i>My List</a></li>
        </ul>
    </nav>

    <div id="mobile-search-overlay" class="fixed inset-0 bg-black bg-opacity-95 z-50 flex-col items-center pt-8 hidden md:hidden">
        <div class="search-header w-11/12 max-w-2xl flex items-center mb-4">
            <input type="text" id="mobile-search-input" placeholder="Search for movies, series..." class="flex-grow bg-gray-800 border border-gray-700 text-white px-4 py-3 rounded-full text-lg focus:outline-none focus:ring-2 focus:ring-red-600 transition-all duration-300">
            <button id="close-search-btn" class="text-white text-3xl ml-4 cursor-pointer hover:text-gray-400 transition-colors">&times;</button>
        </div>
        <div id="mobile-search-results-container" class="w-11/12 max-w-2xl overflow-y-auto flex-grow pb-4">
            </div>
    </div>

    <div id="video-player-overlay" class="fixed inset-0 bg-black bg-opacity-98 z-[1000] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="video-container relative">
            <button class="close-video-btn">&times;</button>
            <video id="movie-player" autoplay playsinline class="w-full h-full bg-black"></video>
            <div class="player-controls absolute bottom-0 left-0 right-0 p-4 flex flex-col gap-2 opacity-0 transition-opacity duration-300">
                <div class="progress-bar-container w-full h-2 bg-gray-700 rounded-full cursor-pointer relative">
                    <div class="progress-bar-fill h-full bg-red-600 rounded-full" style="width: 0%;"></div>
                    <div class="progress-bar-handle absolute top-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-red-600 rounded-full opacity-0 transition-opacity duration-200"></div>
                </div>
                <div class="controls-bottom-row flex items-center justify-between text-white text-lg">
                    <div class="flex items-center gap-4">
                        <button id="play-pause-btn" class="text-2xl"><i class="fas fa-play"></i></button>
                        <button id="rewind-btn" class="text-xl"><i class="fas fa-backward"></i> 10</button>
                        <button id="forward-btn" class="text-xl">10 <i class="fas fa-forward"></i></button>
                        <span id="current-time" class="text-sm">0:00</span> / <span id="duration" class="text-sm">0:00</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="relative group">
                            <button id="audio-track-btn" class="text-xl"><i class="fas fa-headphones"></i></button>
                            <div id="audio-track-options" class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-gray-800 rounded-md shadow-lg p-2 hidden group-hover:block w-32 text-sm">
                                </div>
                        </div>
                        <div class="relative group">
                            <button id="subtitle-btn" class="text-xl"><i class="fas fa-closed-captioning"></i></button>
                            <div id="subtitle-options" class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-gray-800 rounded-md shadow-lg p-2 hidden group-hover:block w-32 text-sm">
                                </div>
                        </div>

                        <button id="volume-btn"><i class="fas fa-volume-up"></i></button>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" class="volume-slider">
                        <button id="fullscreen-btn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
