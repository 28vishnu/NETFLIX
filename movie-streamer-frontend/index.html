<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Base styles for Netflix-like theme */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #141414; /* Netflix dark background */
            color: #e5e5e5; /* Netflix light gray text */
            overflow-x: hidden; /* Prevent horizontal scroll on body */
        }

        /* Custom scrollbar-hide for horizontal sections (Netflix style) */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Header transition and sticky effect */
        #main-header {
            transition: background-color 0.3s ease-in-out, transform 0.3s ease-in-out;
            background-color: transparent; /* Default transparent */
        }
        #main-header.scrolled {
            background-color: #141414; /* Solid background when scrolled */
        }
        #main-header.hide-header {
            transform: translateY(-100%); /* Hides header on scroll down */
        }

        /* Hero section specific styles for full-bleed background and overlay */
        #hero-section {
            height: 85vh; /* Adjust height as needed */
            min-height: 500px;
            position: relative;
            overflow: hidden;
            margin-top: -64px; /* Adjust for header height to make it full-bleed */
            padding-top: 64px; /* Push content down to compensate for negative margin */
            display: flex; /* Ensure flex for centering/positioning slides */
            align-items: center; /* Vertically center content if needed */
            justify-content: center; /* Horizontally center content if needed */
            
            /* Properties for smooth hide/show transition */
            opacity: 1; /* Default to visible */
            visibility: visible;
            pointer-events: auto; /* Default to clickable */
            transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out, height 0.5s ease-in-out;
        }

        #hero-section.hidden-hero { /* New class to hide with transition */
            opacity: 0;
            visibility: hidden;
            height: 0; /* Collapse height when hidden */
            pointer-events: none; /* Make element not clickable */
            /* Overflow hidden is already on #hero-section, but explicitly here for clarity */
            overflow: hidden;
        }


        .hero-slides-container {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1); /* Smooth cubic-bezier transition */
        }

        .hero-slide {
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end; /* Align text content to the bottom */
        }

        /* Dark overlay for hero section to make text readable */
        .hero-slide .absolute.inset-0 {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.6) 50%, transparent 100%);
        }

        .hero-text-content {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 2rem;
            color: white;
            z-index: 10;
            width: 100%;
            max-width: 800px; /* Limit text width */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7); /* Subtle text shadow for readability */
        }

        .hero-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 1rem;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s, opacity 0.3s;
            opacity: 0.7; /* Slightly transparent by default */
        }

        .hero-nav-btn:hover {
            background-color: rgba(0, 0, 0, 0.8);
            opacity: 1;
        }

        /* Movie card specific styles */
        .movie-card {
            background-color: #1a1a1a;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            /* Ensure cards have a defined width for horizontal scrolling */
            flex-shrink: 0; /* Prevent cards from shrinking */
            width: 120px; /* Default width for smallest screens */
        }
        @media (min-width: 640px) { /* sm breakpoint */
            .movie-card {
                width: 160px;
            }
        }
        @media (min-width: 768px) { /* md breakpoint */
            .movie-card {
                width: 180px;
            }
        }
        @media (min-width: 1024px) { /* lg breakpoint */
            .movie-card {
                width: 200px;
            }
        }


        .movie-card-info {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
        }

        /* Movie section styling */
        .movie-section {
            margin-bottom: 2rem;
        }

        .movie-row {
            padding-bottom: 1rem; /* Space below each row */
        }

        /* Detail Overlay */
        #detail-overlay-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* Dark semi-transparent background */
            display: flex; /* Initially hidden via JS, but ready to flex */
            justify-content: center;
            align-items: center;
            z-index: 1000; /* High z-index to appear above everything */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        #detail-overlay-container.active {
            opacity: 1;
            visibility: visible;
        }

        .detail-overlay-content {
            background-color: #1a1a1a;
            border-radius: 8px;
            color: white;
            position: relative;
            display: flex;
            flex-direction: row; /* Default for larger screens */
            max-width: 1000px;
            max-height: 80vh; /* Adjust max height for scrollability */
            overflow-y: auto; /* Enable scrolling for content within the overlay */
            padding: 1.5rem;
            gap: 1.5rem;
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        #detail-overlay-container.active .detail-overlay-content {
            transform: scale(1);
            opacity: 1;
        }

        .detail-overlay-content .close-overlay-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            position: absolute;
            top: 10px;
            right: 15px;
            z-index: 10;
            transition: color 0.2s ease;
        }

        .detail-overlay-content .close-overlay-btn:hover {
            color: #ccc;
        }

        /* Responsive adjustments for detail overlay content */
        @media (max-width: 767px) {
            .detail-overlay-content {
                flex-direction: column; /* Stack image and details vertically on small screens */
                max-height: 95vh; /* Allow more height on small screens */
                overflow-y: auto; /* Ensure scrolling works if content is too long */
            }
            .detail-content-poster {
                width: 100%; /* Full width for poster on small screens */
                display: flex; /* Use flex to center image */
                justify-content: center;
            }
            .detail-content-poster img {
                width: 70%; /* Make image smaller within its full-width container */
                height: auto;
            }
        }

        /* Loading Indicator Styles */
        #loading-indicator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease; /* Smooth fade in/out */
        }

        #loading-indicator.hidden {
            opacity: 0;
            pointer-events: none; /* Allow clicks through when hidden */
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #e50914; /* Netflix red */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Message Box */
        #message-box {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            pointer-events: none; /* Allow clicks through when not visible */
        }

        #message-box.show {
            opacity: 1;
            pointer-events: auto; /* Enable clicks when visible */
        }

        /* Mobile Navigation Overlay */
        #mobile-nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95); /* Darker overlay */
            z-index: 100; /* Below detail overlay, above main content */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform: translateX(-100%); /* Start off-screen to the left */
            transition: transform 0.3s ease-in-out;
        }

        #mobile-nav-overlay.active {
            transform: translateX(0); /* Slide in */
        }

        #mobile-nav-overlay .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
        }

        #mobile-nav-overlay ul {
            list-style: none;
            padding: 0;
            text-align: center;
        }

        #mobile-nav-overlay ul li {
            margin: 1.5rem 0;
        }

        #mobile-nav-overlay ul li a {
            font-size: 1.8rem;
            color: white;
            text-decoration: none;
            transition: color 0.2s;
        }

        #mobile-nav-overlay ul li a:hover {
            color: #e50914;
        }

    </style>
</head>
<body class="bg-black text-gray-100 font-sans">
    <header id="main-header" class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-4 md:px-8 py-3">
        <div class="flex items-center space-x-6">
            <button id="mobile-menu-toggle" class="text-white text-2xl md:hidden">
                <i class="fas fa-bars"></i>
            </button>
            <a href="#" class="text-red-600 text-3xl font-bold">NETFLIX</a>
            <nav class="hidden md:block"> <ul class="flex space-x-4">
                    <li><a href="#" class="nav-link text-white hover:text-gray-300 transition-colors" data-content="home">Home</a></li>
                    <li><a href="#" class="nav-link text-white hover:text-gray-300 transition-colors" data-content="series">Series</a></li>
                    <li><a href="#" class="nav-link text-white hover:text-gray-300 transition-colors" data-content="movies">Movies</a></li>
                    <li><a href="#" class="nav-link text-white hover:text-gray-300 transition-colors" data-content="mylist">My List</a></li>
                </ul>
            </nav>
        </div>
        <div class="flex items-center space-x-4">
            <div id="search-input-wrapper" class="relative hidden md:block">
                <input type="text" id="search-input" placeholder="Search..." class="bg-gray-800 text-white px-3 py-1 rounded-md focus:outline-none focus:ring-2 focus:ring-red-600">
            </div>
            <button id="search-toggle-btn" class="text-white text-lg md:hidden">
                <i class="fas fa-search"></i>
            </button>
            <div id="user-details" class="flex items-center space-x-2 cursor-pointer">
                <img src="https://via.placeholder.com/30" alt="User Avatar" class="rounded-full w-8 h-8">
                <span>Guest</span>
            </div>
        </div>
    </header>

    <div id="mobile-nav-overlay" class="hidden">
        <button class="close-btn" id="mobile-nav-close-btn">&times;</button>
        <ul>
            <li><a href="#" class="nav-link" data-content="home">Home</a></li>
            <li><a href="#" class="nav-link" data-content="series">Series</a></li>
            <li><a href="#" class="nav-link" data-content="movies">Movies</a></li>
            <li><a href="#" class="nav-link" data-content="mylist">My List</a></li>
        </ul>
    </div>

    <section id="hero-section" class="relative bg-black text-white">
        <div id="hero-slides-container" class="hero-slides-container">
            </div>

        <button id="hero-prev-btn" class="hero-nav-btn left-4 hidden md:flex">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button id="hero-next-btn" class="hero-nav-btn right-4 hidden md:flex">
            <i class="fas fa-chevron-right"></i>
        </button>

        <div id="hero-dots-container" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2 z-20">
            </div>
    </section>

    <div id="movie-sections" class="p-4 md:p-8 pt-20">
        </div>

    <div id="detail-overlay-container" style="display: none;">
        <div class="detail-overlay-content">
            <button class="close-overlay-btn" aria-label="Close details">&times;</button>
            <div class="detail-content-poster flex-shrink-0">
                <img id="overlay-poster" src="" alt="Poster" class="w-full h-auto rounded-md">
            </div>
            <div class="detail-content-info flex-grow">
                <h2 id="overlay-title" class="text-3xl md:text-4xl font-bold mb-2"></h2>
                <p id="overlay-plot" class="text-base mb-4"></p>
                <p class="text-sm"><strong class="text-gray-400">Genre:</strong> <span id="overlay-genre"></span></p>
                <p class="text-sm"><strong class="text-gray-400">Released:</strong> <span id="overlay-released"></span></p>
                <p class="text-sm"><strong class="text-gray-400">Runtime:</strong> <span id="overlay-runtime"></span></p>
                <p class="text-sm"><strong class="text-gray-400">IMDb Rating:</strong> <span id="overlay-rating"></span></p>
                <div class="mt-4 flex space-x-3">
                    <button class="bg-red-600 text-white px-4 py-2 rounded-md font-semibold hover:bg-red-700 transition-colors flex items-center">
                        <i class="fas fa-play mr-2"></i> Play
                    </button>
                    <button class="bg-gray-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-gray-600 transition-colors flex items-center">
                        <i class="fas fa-plus mr-2"></i> My List
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-indicator" class="hidden">
        <div class="spinner"></div>
    </div>

    <div id="message-box" role="alert" aria-live="assertive"></div>

    <script src="script.js"></script>
</body>
</html>
