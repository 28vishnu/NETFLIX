<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Watch TV Shows Online, Watch Movies Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 
    =========================================
    CSS SECTION (Styling)
    =========================================
    -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap');

        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-dark-gray: #181818;
            --transition-timing: cubic-bezier(0.33, 1, 0.68, 1);
        }

        body {
            background-color: var(--netflix-black);
            color: white;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar Sticky & Transition */
        #navbar {
            transition: background-color 0.4s ease, padding 0.4s;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .nav-scrolled {
            background-color: #141414 !important;
            background-image: none !important;
            padding-top: 12px !important;
            padding-bottom: 12px !important;
        }

        /* Search Bar Expanding UI */
        .search-container {
            display: flex;
            align-items: center;
            background: transparent;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            padding: 4px 0;
        }
        .search-container.active {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid white;
            padding: 4px 10px;
        }
        #searchInput {
            width: 0;
            opacity: 0;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 14px;
            transition: width 0.3s ease, opacity 0.3s ease;
        }
        .search-container.active #searchInput {
            width: 200px;
            opacity: 1;
            margin-left: 10px;
        }

        /* Billboard Styling */
        #billboard {
            position: relative;
            height: 90vh;
            width: 100%;
            background-size: cover;
            background-position: center 10%;
            display: flex;
            align-items: center;
            background-color: #000;
            transition: background-image 1.2s ease-in-out;
        }

        .billboard-vignette {
            background: linear-gradient(77deg, rgba(0,0,0,.8) 0, rgba(0,0,0,0) 85%);
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .billboard-bottom-fade {
            background-image: linear-gradient(180deg, transparent, rgba(20, 20, 20, 0.5), #141414);
            height: 40%;
            width: 100%;
            position: absolute;
            bottom: 0;
            z-index: 5;
            pointer-events: none;
        }

        .billboard-content {
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }
        .billboard-content.fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

        /* Maturity Rating */
        .maturity-rating {
            background-color: rgba(51, 51, 51, .6);
            border-left: 3px solid #dcdcdc;
            padding: .5vw 3.5vw .5vw .8vw;
            font-size: 1.1vw;
            z-index: 20;
        }

        /* Movie Row & Hover logic */
        .row-container {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            overflow-y: visible;
            padding: 2rem 3.5rem;
            margin: -2rem 0;
            scroll-behavior: smooth;
        }
        .row-container::-webkit-scrollbar { display: none; }
        
        .movie-card {
            transition: transform 0.3s var(--transition-timing);
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .mini-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: #181818;
            border-radius: 4px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            opacity: 0;
            pointer-events: none;
            transform: scale(1);
            transition: all 0.4s var(--transition-timing);
            z-index: 100;
        }

        .movie-card:hover {
            z-index: 50;
        }

        .movie-card:hover .mini-modal {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1.5) translateY(-15%);
        }

        /* Top 10 Sizing */
        .top10-number {
            font-size: 14vw;
            line-height: 0.75;
            font-weight: 900;
            color: #141414;
            -webkit-text-stroke: 2px #595959;
            user-select: none;
            margin-right: -1.5vw;
            display: inline-block;
        }

        /* Search Grid Styling */
        #searchGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 30px 10px;
        }

        /* Skeleton Shimmer */
        .shimmer {
            background: linear-gradient(90deg, #222 25%, #333 50%, #222 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .badge-netflix {
            background: #E50914;
            color: white;
            padding: 1px 4px;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 1px;
        }
    </style>
</head>
<body>

    <!-- 
    =========================================
    HTML SECTION (Structure)
    =========================================
    -->
    <nav id="navbar" class="fixed top-0 w-full z-[100] flex items-center justify-between px-4 md:px-14 py-5">
        <div class="flex items-center gap-8">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="NETFLIX" class="w-24 cursor-pointer" onclick="window.location.reload()">
            <ul class="hidden xl:flex items-center gap-5 text-[14px] font-normal text-[#e5e5e5]">
                <li class="hover:text-gray-400 cursor-pointer transition font-bold text-white">Home</li>
                <li class="hover:text-gray-400 cursor-pointer transition">TV Series</li>
                <li class="hover:text-gray-400 cursor-pointer transition">Movies</li>
                <li class="hover:text-gray-400 cursor-pointer transition">New & Popular</li>
                <li class="hover:text-gray-400 cursor-pointer transition">My List</li>
            </ul>
        </div>
        
        <div class="flex items-center gap-6 text-white">
            <div id="searchBox" class="search-container">
                <i id="searchIcon" class="fa-solid fa-magnifying-glass text-lg cursor-pointer"></i>
                <input type="text" id="searchInput" placeholder="Titles, people, genres">
            </div>
            <div class="relative cursor-pointer">
                <i class="fa-solid fa-bell text-xl"></i>
                <span class="absolute -top-1 -right-1 bg-[#E50914] text-[9px] w-4 h-4 flex items-center justify-center rounded-full border border-black font-bold">5</span>
            </div>
            <div class="flex items-center gap-2 cursor-pointer">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" class="w-8 h-8 rounded" alt="User">
                <i class="fa-solid fa-caret-down text-xs"></i>
            </div>
        </div>
    </nav>

    <!-- Home View -->
    <div id="homeView">
        <header id="billboard">
            <div class="billboard-vignette"></div>
            <div class="billboard-bottom-fade"></div>
            
            <div id="billboardContent" class="billboard-content z-10 px-4 md:px-14 w-full max-w-2xl">
                <div class="flex items-center mb-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" class="w-5 mr-2" alt="N">
                    <span id="billboardCategory" class="tracking-[0.4em] text-[12px] font-bold text-gray-300 uppercase">Original</span>
                </div>
                <h1 id="billboardTitle" class="text-5xl md:text-7xl font-black mb-4 uppercase italic tracking-tighter leading-none drop-shadow-lg">
                    NETFLIX
                </h1>
                <p id="billboardDesc" class="text-sm md:text-lg leading-snug text-white drop-shadow-md mb-8 line-clamp-3 font-medium max-w-lg">
                    Discover your next favorite story.
                </p>
                <div class="flex gap-3">
                    <button onclick="playCurrent()" class="bg-white text-black px-10 py-2.5 rounded-md flex items-center gap-2 text-xl font-bold hover:bg-white/80 transition">
                        <i class="fa-solid fa-play"></i> Play
                    </button>
                    <button id="billboardInfoBtn" class="bg-[rgba(109,109,110,0.7)] text-white px-10 py-2.5 rounded-md flex items-center gap-2 text-xl font-bold hover:bg-[rgba(109,109,110,0.5)] transition">
                        <i class="fa-solid fa-circle-info"></i> More Info
                    </button>
                </div>
            </div>

            <div class="absolute bottom-[20%] right-0 z-30">
                <div class="maturity-rating">A 18+</div>
            </div>
        </header>

        <main class="relative z-20 pb-20 pt-10">
            <div id="rowsContainer"></div>
        </main>
    </div>

    <!-- Search View -->
    <div id="searchView" class="hidden px-4 md:px-14 pt-32 min-h-screen">
        <h2 class="text-gray-400 text-lg mb-8 font-medium">Explore titles related to: <span id="searchLabel" class="text-white"></span></h2>
        <div id="searchGrid"></div>
    </div>

    <!-- Modal -->
    <div id="movieModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center bg-black/80 p-4 backdrop-blur-sm">
        <div id="modalBox" class="bg-[#181818] w-full max-w-4xl rounded-xl overflow-hidden relative shadow-2xl transition-all duration-300 opacity-0 scale-90">
            <button id="closeModal" class="absolute top-4 right-4 z-50 w-10 h-10 bg-[#181818]/80 rounded-full flex items-center justify-center hover:bg-black transition">
                <i class="fa-solid fa-xmark text-xl text-white"></i>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- 
    =========================================
    JAVASCRIPT SECTION (Logic)
    =========================================
    -->
    <script>
        const API_KEY = '275dc2d8';
        const BASE_URL = 'https://www.omdbapi.com/';
        
        const navbar = document.getElementById('navbar');
        const billboard = document.getElementById('billboard');
        const homeView = document.getElementById('homeView');
        const searchView = document.getElementById('searchView');
        const searchGrid = document.getElementById('searchGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBox = document.getElementById('searchBox');
        const searchIcon = document.getElementById('searchIcon');
        const searchLabel = document.getElementById('searchLabel');
        const movieModal = document.getElementById('movieModal');
        const modalBox = document.getElementById('modalBox');

        const globalMovieSet = new Set();
        let billboardMovies = [];
        let currentBillboardIndex = 0;
        let searchTimeout = null;

        const categories = [
            { title: "Trending Now", query: "action" },
            { title: "Top 10 Movies in India Today", query: "hit", type: "top10" },
            { title: "New on Netflix", query: "2025" },
            { title: "Hollywood Blockbusters", query: "marvel" },
            { title: "Indian Cinema", query: "hindi" },
            { title: "Top 10 Series in Netflix Today", query: "series", type: "top10" },
            { title: "Anime Favorites", query: "naruto" },
            { title: "Award-Winning Dramas", query: "oscar" },
            { title: "Sci-Fi Thrillers", query: "space" },
            { title: "Crime Documentaries", query: "crime" },
            { title: "Heist Movies", query: "money" },
            { title: "Horror Hits", query: "ghost" },
            { title: "Family Movies", query: "animated" },
            { title: "Mystery & Suspense", query: "mystery" },
            { title: "Classic Hollywood", query: "gold" },
            { title: "Historical Epics", query: "war" }
        ];

        // Navbar Scroll Handler
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) navbar.classList.add('nav-scrolled');
            else navbar.classList.remove('nav-scrolled');
        });

        // Search Interaction Logic
        searchIcon.addEventListener('click', () => {
            searchBox.classList.toggle('active');
            if (searchBox.classList.contains('active')) {
                searchInput.focus();
            } else {
                searchInput.value = '';
                toggleView(false);
            }
        });

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            searchLabel.innerText = query;
            
            clearTimeout(searchTimeout);
            
            if (query.length > 2) {
                toggleView(true);
                searchTimeout = setTimeout(() => performSearch(query), 500);
            } else if (query.length === 0) {
                toggleView(false);
            }
        });

        function toggleView(isSearching) {
            if (isSearching) {
                homeView.classList.add('hidden');
                searchView.classList.remove('hidden');
            } else {
                homeView.classList.remove('hidden');
                searchView.classList.add('hidden');
            }
        }

        async function performSearch(query) {
            searchGrid.innerHTML = Array(6).fill('<div class="aspect-[2/3] shimmer rounded"></div>').join('');
            try {
                const res = await fetch(`${BASE_URL}?apikey=${API_KEY}&s=${query}`);
                const data = await res.json();
                if (data.Search) {
                    searchGrid.innerHTML = data.Search
                        .filter(m => m.Poster !== 'N/A')
                        .map(movie => createMovieCard(movie, false)) // false = don't use absolute sizing in grid
                        .join('');
                } else {
                    searchGrid.innerHTML = `<p class="col-span-full text-center text-gray-500 py-20">No results found for "${query}"</p>`;
                }
            } catch (err) {
                searchGrid.innerHTML = `<p class="col-span-full text-center text-red-600 py-20">Error connecting to server</p>`;
            }
        }

        // Billboard Rotation Logic
        async function loadBillboardRotation() {
            try {
                const res = await fetch(`${BASE_URL}?apikey=${API_KEY}&s=2024&type=movie`); 
                const data = await res.json();
                if (data.Search) {
                    const detailPromises = data.Search.slice(0, 10).map(m => 
                        fetch(`${BASE_URL}?apikey=${API_KEY}&i=${m.imdbID}`).then(r => r.json())
                    );
                    billboardMovies = (await Promise.all(detailPromises)).filter(m => m.Poster !== 'N/A');
                    if (billboardMovies.length > 0) {
                        displayBillboardMovie(0);
                        setInterval(rotateBillboard, 7000); 
                    }
                }
            } catch (err) { console.error(err); }
        }

        function displayBillboardMovie(index) {
            const movie = billboardMovies[index];
            if (!movie) return;
            billboardContent.classList.add('fade-out');
            setTimeout(() => {
                billboard.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('${movie.Poster}')`;
                document.getElementById('billboardTitle').innerText = movie.Title;
                document.getElementById('billboardDesc').innerText = movie.Plot || "Streaming now on Netflix.";
                document.getElementById('billboardCategory').innerText = movie.Type === 'series' ? 'Series' : 'Film';
                document.getElementById('billboardInfoBtn').onclick = () => openMovieDetails(movie.imdbID);
                billboardContent.classList.remove('fade-out');
            }, 800);
        }

        function rotateBillboard() {
            currentBillboardIndex = (currentBillboardIndex + 1) % billboardMovies.length;
            displayBillboardMovie(currentBillboardIndex);
        }

        // Row Generation
        async function loadRows() {
            for (const cat of categories) {
                const row = document.createElement('div');
                row.className = 'mb-12';
                const isTop10 = cat.type === 'top10';
                row.innerHTML = `
                    <div class="px-4 md:px-14 mb-2">
                        <h2 class="text-[1.3vw] font-bold text-[#e5e5e5] hover:text-white cursor-pointer transition">
                            ${cat.title} 
                            <span class="text-[0.9vw] text-netflix-red ml-2 opacity-0 hover:opacity-100 transition-all">Explore All &gt;</span>
                        </h2>
                    </div>
                    <div class="row-container">
                        ${Array(12).fill('<div class="h-[160px] md:h-[220px] aspect-[2/3] shimmer rounded"></div>').join('')}
                    </div>
                `;
                rowsContainer.appendChild(row);
                fetchMoviesForRow(cat.query, row.querySelector('.row-container'), isTop10);
            }
        }

        async function fetchMoviesForRow(query, container, isTop10) {
            try {
                const res = await fetch(`${BASE_URL}?apikey=${API_KEY}&s=${query}`);
                const data = await res.json();
                if (data.Search) {
                    const filtered = data.Search.filter(movie => {
                        if (movie.Poster === 'N/A') return false;
                        if (globalMovieSet.has(movie.imdbID)) return false;
                        globalMovieSet.add(movie.imdbID);
                        return true;
                    });
                    const finalSelection = filtered.length > 2 ? filtered : data.Search.filter(m => m.Poster !== 'N/A');
                    container.innerHTML = finalSelection.slice(0, 12).map((movie, index) => 
                        isTop10 ? createTop10Card(movie, index + 1) : createMovieCard(movie, true)
                    ).join('');
                }
            } catch (err) { console.error(err); }
        }

        function createMovieCard(movie, fixedHeight) {
            const hClass = fixedHeight ? 'h-[160px] md:h-[220px]' : 'aspect-[2/3]';
            return `
                <div class="movie-card ${hClass} aspect-[2/3] cursor-pointer" onclick="openMovieDetails('${movie.imdbID}')">
                    <img src="${movie.Poster}" class="w-full h-full object-cover rounded shadow-md" loading="lazy">
                    <div class="mini-modal">
                        <img src="${movie.Poster}" class="w-full h-32 object-cover rounded-t">
                        <div class="p-3 bg-[#181818]">
                            <div class="flex gap-2 mb-3">
                                <div class="w-7 h-7 rounded-full bg-white text-black flex items-center justify-center hover:bg-gray-200"><i class="fa-solid fa-play text-[10px]"></i></div>
                                <div class="w-7 h-7 rounded-full border border-gray-500 text-white flex items-center justify-center"><i class="fa-solid fa-plus text-[10px]"></i></div>
                                <div class="w-7 h-7 rounded-full border border-gray-500 text-white flex items-center justify-center ml-auto hover:border-white"><i class="fa-solid fa-chevron-down text-[10px]"></i></div>
                            </div>
                            <div class="flex items-center gap-2 text-[9px] font-bold text-gray-300">
                                <span class="text-green-500">98% Match</span>
                                <span class="border border-gray-500 px-1">UA 16+</span>
                                <span>2h 5m</span>
                                <span class="border border-gray-500 px-1 rounded-sm text-[8px]">HD</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function createTop10Card(movie, rank) {
            return `
                <div class="flex items-center flex-shrink-0 h-[160px] md:h-[220px] cursor-pointer group" onclick="openMovieDetails('${movie.imdbID}')">
                    <span class="top10-number group-hover:scale-110 transition-transform duration-500">${rank}</span>
                    <div class="movie-card h-full aspect-[2/3] relative">
                        <img src="${movie.Poster}" class="w-full h-full object-cover rounded shadow-lg" loading="lazy">
                    </div>
                </div>
            `;
        }

        // Modal Logic
        async function openMovieDetails(id) {
            movieModal.classList.remove('hidden');
            setTimeout(() => { modalBox.classList.add('opacity-100', 'scale-100'); }, 10);
            document.body.style.overflow = 'hidden';
            modalContent.innerHTML = `<div class="p-40 text-center"><i class="fa-solid fa-spinner fa-spin text-4xl text-red-600"></i></div>`;
            try {
                const res = await fetch(`${BASE_URL}?apikey=${API_KEY}&i=${id}&plot=full`);
                const movie = await res.json();
                modalContent.innerHTML = `
                    <div class="relative h-[480px]">
                        <img src="${movie.Poster}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#181818] via-[#181818]/10 to-transparent"></div>
                        <div class="absolute bottom-10 left-10 w-full pr-10">
                            <h2 class="text-6xl font-black mb-8 italic tracking-tighter uppercase leading-none drop-shadow-2xl">${movie.Title}</h2>
                            <div class="flex items-center gap-4">
                                <button class="bg-white text-black px-12 py-3 rounded-md font-bold text-xl flex items-center gap-3 hover:bg-gray-200">
                                    <i class="fa-solid fa-play"></i> Play
                                </button>
                                <button class="w-12 h-12 rounded-full border-2 border-gray-500 flex items-center justify-center hover:border-white"><i class="fa-solid fa-plus text-xl"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="p-12 grid grid-cols-1 md:grid-cols-3 gap-12 bg-[#181818]">
                        <div class="md:col-span-2 text-gray-300">
                            <div class="flex items-center gap-4 text-xl font-bold mb-6">
                                <span class="text-green-500">99% Match</span>
                                <span>${movie.Year}</span>
                                <span class="border border-gray-600 px-2 rounded text-sm">UA 16+</span>
                                <span>${movie.Runtime}</span>
                            </div>
                            <p class="text-xl leading-relaxed">${movie.Plot}</p>
                        </div>
                        <div class="text-sm text-gray-400 space-y-4">
                            <p><span class="text-gray-500">Cast:</span> ${movie.Actors}</p>
                            <p><span class="text-gray-500">Genres:</span> ${movie.Genre}</p>
                            <p><span class="text-gray-500">Director:</span> ${movie.Director}</p>
                        </div>
                    </div>
                `;
            } catch (err) { modalContent.innerHTML = `<p class="p-20">Error loading movie details.</p>`; }
        }

        const closeModalFunc = () => {
            modalBox.classList.remove('opacity-100', 'scale-100');
            setTimeout(() => { movieModal.classList.add('hidden'); document.body.style.overflow = 'auto'; }, 300);
        };
        document.getElementById('closeModal').onclick = closeModalFunc;
        window.onclick = (e) => { if (e.target === movieModal) closeModalFunc(); };

        function playCurrent() {
            const title = document.getElementById('billboardTitle').innerText;
            alert(`Now playing: ${title}`);
        }

        window.onload = () => {
            loadBillboardRotation();
            loadRows();
        };
    </script>
</body>
</html>
