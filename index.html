<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - StreamVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col bg-[#141414] text-[#e5e5e5]">
    <header class="bg-gradient-to-b from-black to-transparent p-4 md:px-8 flex justify-between items-center fixed top-0 w-full z-50 transition-all duration-300" id="main-header">
        <div class="flex items-center space-x-4 md:space-x-6">
            <a href="#" class="text-red-600 text-3xl md:text-4xl font-bold tracking-tighter">NETFLIX</a>
            <nav class="hidden md:flex space-x-6 text-gray-300 text-sm">
                <a href="#" class="nav-link active" data-category-type="home">Home</a>
                <a href="#" class="nav-link" data-category-type="series">Series</a>
                <a href="#" class="nav-link" data-category-type="movie">Movies</a>
                <a href="#" class="nav-link" data-category-type="my-list">My List</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4 md:space-x-6">
            <div class="relative flex items-center">
                <div id="search-input-wrapper" class="relative flex items-center bg-black border border-transparent rounded-md transition-all duration-300 ease-in-out overflow-hidden w-0 opacity-0">
                    <i class="fas fa-search text-white text-lg absolute left-3"></i>
                    <input type="text" id="search-input" placeholder="Titles, people, genres" class="w-full pl-10 pr-3 py-2 bg-transparent text-white rounded-md focus:outline-none focus:ring-0 text-sm">
                </div>
                <button id="search-toggle-btn" class="text-white hover:text-gray-300 transition-colors duration-200 p-2">
                    <i class="fas fa-search text-xl"></i>
                </button>
            </div>
            <div id="user-details" class="flex items-center space-x-2 cursor-pointer">
                <span class="text-sm font-semibold hidden md:block">Guest</span>
                <img src="https://placehold.co/40x40/FF0000/FFFFFF?text=U" alt="User Profile" class="w-8 h-8 rounded-full border-2 border-gray-400">
            </div>
        </div>
    </header>

    <main class="flex-grow">
        <section id="hero-section" class="relative w-full overflow-hidden" style="height: calc(100vh - 4rem);">
            <div id="hero-slides-container" class="flex w-full h-full">
            </div>
            <button id="hero-prev-btn" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 p-3 rounded-full text-white text-2xl hover:bg-opacity-75 transition-opacity duration-200 z-10 hidden md:block">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button id="hero-next-btn" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 p-3 rounded-full text-white text-2xl hover:bg-opacity-75 transition-opacity duration-200 z-10 hidden md:block">
                <i class="fas fa-chevron-right"></i>
            </button>
            <div id="hero-dots-container" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2 z-10">
            </div>
        </section>

        <section id="movie-sections" class="p-4 md:p-8 relative z-10">
            <div id="loading-indicator" class="text-center text-white text-xl p-8 hidden">
                <i class="fas fa-spinner fa-spin mr-2"></i> Loading content...
            </div>
            </section>
    </main>

    <div id="video-player-overlay" class="fixed inset-0 bg-black bg-opacity-95 flex items-center justify-center z-[100] hidden">
        <div class="relative w-full h-full max-w-screen-xl max-h-[80vh] flex flex-col items-center justify-center">
            <button id="close-player-btn" class="absolute top-4 right-4 bg-red-600 text-white rounded-full p-2 text-xl z-10 hover:bg-red-700 transition-colors duration-200">
                <i class="fas fa-times"></i>
            </button>
            <video id="video-player" class="w-full h-full object-contain" controls autoplay></video>
            <div id="buffering-spinner" class="absolute text-white text-4xl hidden">
                <i class="fas fa-spinner fa-spin"></i>
            </div>
            <p id="player-status-text" class="absolute bottom-10 text-white text-lg"></p>
        </div>
    </div>

    <div id="detail-overlay" class="fixed inset-0 bg-black bg-opacity-95 flex items-center justify-center z-[90] hidden overflow-y-auto">
        <div class="relative bg-[#1a1a1a] rounded-lg shadow-xl w-11/12 md:w-3/4 lg:w-2/3 max-h-[90vh] overflow-y-auto p-4 md:p-8 my-8">
            <button id="close-detail-btn" class="absolute top-4 right-4 bg-red-600 text-white rounded-full p-2 text-xl z-10 hover:bg-red-700 transition-colors duration-200">
                <i class="fas fa-times"></i>
            </button>
            <img id="detail-image" src="" alt="Content Backdrop" class="w-full h-48 md:h-72 object-cover rounded-lg mb-4">
            <h2 id="detail-title" class="text-2xl md:text-4xl font-bold text-white mb-2"></h2>
            <p id="detail-description" class="text-gray-300 text-base md:text-lg mb-4"></p>
            <div class="flex flex-wrap items-center text-gray-400 text-sm md:text-base mb-4 space-x-4">
                <span id="detail-release-year"><i class="fas fa-calendar-alt mr-1"></i> 2023</span>
                <span id="detail-duration"><i class="fas fa-clock mr-1"></i> 2h 30m</span>
                <span id="detail-rating"><i class="fas fa-star mr-1"></i> 8.5</span>
            </div>
            <p id="detail-genres" class="text-gray-300 text-sm md:text-base mb-4"></p>
            <div class="flex flex-col md:flex-row space-y-3 md:space-y-0 md:space-x-3">
                <button id="play-detail-btn" class="bg-white text-black px-6 py-3 rounded-md font-semibold text-lg hover:bg-gray-300 transition-colors duration-200 flex items-center justify-center w-full md:w-auto">
                    <i class="fas fa-play mr-2"></i> Play
                </button>
                <button id="add-to-list-btn" class="bg-gray-700 text-white px-6 py-3 rounded-md font-semibold text-lg hover:bg-gray-600 transition-colors duration-200 flex items-center justify-center w-full md:w-auto">
                    <i class="fas fa-plus mr-2"></i> My List
                </button>
            </div>

            <div id="more-like-this-section" class="mt-8 hidden">
                <h3 class="text-xl md:text-2xl font-bold mb-4 text-white">More Like This</h3>
                <div id="more-like-this-carousel" class="movie-grid-carousel">
                </div>
            </div>
        </div>
    </div>

    <div id="view-all-overlay" class="fixed inset-0 bg-black bg-opacity-95 flex items-center justify-center z-[95] hidden overflow-y-auto">
        <div class="relative bg-[#1a1a1a] rounded-lg shadow-xl w-11/12 md:w-3/4 lg:w-2/3 max-h-[90vh] overflow-y-auto p-4 md:p-8 my-8">
            <button id="close-view-all-btn" class="absolute top-4 right-4 bg-red-600 text-white rounded-full p-2 text-xl z-10 hover:bg-red-700 transition-colors duration-200">
                <i class="fas fa-times"></i>
            </button>
            <h2 id="view-all-title" class="text-2xl md:text-4xl font-bold text-white mb-4"></h2>
            <div id="view-all-content-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
                </div>
            <div class="flex justify-center items-center space-x-4 mt-8">
                <button id="view-all-prev-btn" class="bg-gray-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-gray-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Previous</button>
                <span id="view-all-page-info" class="text-gray-300 text-lg">Page 1</span>
                <button id="view-all-next-btn" class="bg-gray-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-gray-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Next</button>
            </div>
        </div>
    </div>

    <nav id="mobile-bottom-nav" class="fixed bottom-0 left-0 w-full bg-black bg-opacity-95 text-gray-400 text-xs py-2 z-50 border-t border-gray-800 flex justify-around items-center md:hidden">
        <a href="#" class="nav-link flex flex-col items-center p-2 hover:text-white transition-colors duration-200 active" data-category-type="home">
            <i class="fas fa-home text-lg mb-1"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-link flex flex-col items-center p-2 hover:text-white transition-colors duration-200" data-category-type="series">
            <i class="fas fa-tv text-lg mb-1"></i>
            <span>Series</span>
        </a>
        <a href="#" class="nav-link flex flex-col items-center p-2 hover:text-white transition-colors duration-200" data-category-type="movie">
            <i class="fas fa-film text-lg mb-1"></i>
            <span>Movies</span>
        </a>
        <a href="#" class="nav-link flex flex-col items-center p-2 hover:text-white transition-colors duration-200" data-category-type="my-list">
            <i class="fas fa-list text-lg mb-1"></i>
            <span>My List</span>
        </a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
